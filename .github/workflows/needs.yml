name: My First Workflow

on: push

jobs:
  say-hello:
    runs-on: ubuntu-latest

    steps:
      - name: Print message
        run: echo "Hello, Github Actions!"

      - name: Print another message
        run: echo " Hii from Ridham Garg"


  say-bye:
    needs: say-hello
    runs-on: ubuntu-latest

    steps:
     - name: Print bye
       run: echo "Goodbye from second job"


  