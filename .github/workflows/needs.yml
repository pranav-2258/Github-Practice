name: My First Workflow

on: push

jobs:
  say-hello:
    runs-on: ubuntu-latest

    steps:
      - name: Print message
        run: echo "Hello, Github Actions!"

      - name: Print another message
        run: echo " Hii from Ridham Garg"


  say-checkout:
    needs: say-hello
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup node"
        uses: actions/setup-node@v1'
        with:
          node-version: '14'

      - name: Check Node version
        run: node -v

  say-bye:
    needs: say-hello
    runs-on: ubuntu-latest

    steps:
     - name: Print bye
       run: echo "Goodbye from second job"


  